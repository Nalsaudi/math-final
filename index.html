<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>🌍 عالم الرياضيات — رحلة عبدالله</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1d2440; --ink2:#48507a; --muted:#8a90b3;
  --bg:#eef1fb; --card:#ffffff; --line:#e4e8f7;
  --ok:#16a06a; --okbg:#e3f7ee; --bad:#e5484d; --badbg:#fdeaea; --warn:#f59e0b;
  --gold:#f5a623; --star:#ffce3d;
  --w-accent:#6c5ce7; --w-soft:#efeaff;
  --r:20px; --sh:0 10px 30px rgba(40,46,90,.10); --sh2:0 4px 14px rgba(40,46,90,.08);
  --f-d:'Baloo Bhaijaan 2',system-ui; --f-b:'Tajawal',system-ui;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:var(--f-b);background:
  radial-gradient(1200px 600px at 100% -10%, #e7e0ff 0%, transparent 55%),
  radial-gradient(1000px 500px at -10% 0%, #dff0ff 0%, transparent 50%),
  var(--bg);
  color:var(--ink);line-height:1.7;min-height:100vh}
img{max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.wrap{max-width:1080px;margin:0 auto;padding:0 16px 90px}
.hidden{display:none!important}

/* ===== Top bar ===== */
.topbar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.82);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topbar .in{max-width:1080px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:12px}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--f-d);font-weight:800;font-size:1.15rem;cursor:pointer}
.brand .logo{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;
  background:linear-gradient(135deg,#6c5ce7,#00b4d8);color:#fff;font-size:1.2rem;box-shadow:var(--sh2)}
.spacer{flex:1}
.starcount{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);
  border-radius:999px;padding:6px 12px;font-weight:800;color:#b8860b;box-shadow:var(--sh2)}
.btn-ghost{border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px 12px;font-weight:700;color:var(--ink2)}
.btn-ghost:hover{border-color:var(--w-accent);color:var(--w-accent)}

/* ===== Hero / dashboard ===== */
.hero{position:relative;margin-top:18px;border-radius:28px;overflow:hidden;
  background:linear-gradient(135deg,#5b4bd6 0%,#7a5cf0 45%,#2aa9e0 100%);
  color:#fff;padding:30px 26px;box-shadow:var(--sh)}
.hero h1{font-family:var(--f-d);font-size:2.05rem;margin:.1em 0;line-height:1.25}
.hero p{opacity:.95;margin:.2em 0 1em;font-size:1.05rem}
.hero .deco{position:absolute;inset:0;pointer-events:none;opacity:.25;font-size:2rem}
.dash{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:6px}
.dcard{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);
  border-radius:18px;padding:14px;text-align:center;backdrop-filter:blur(4px)}
.dcard .n{font-family:var(--f-d);font-size:1.7rem;font-weight:800;line-height:1}
.dcard .l{font-size:.82rem;opacity:.92;margin-top:4px}
.progress{margin-top:16px}
.pbar{height:14px;border-radius:999px;background:rgba(255,255,255,.25);overflow:hidden}
.pbar>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#ffe169,#ffb03a);transition:width .6s}
.plabel{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:6px;opacity:.95}

/* ===== Section title ===== */
.sec-h{display:flex;align-items:center;gap:10px;margin:26px 4px 14px}
.sec-h h2{font-family:var(--f-d);font-size:1.45rem;margin:0}
.sec-h .pill{font-size:.78rem;background:var(--w-soft);color:var(--w-accent);padding:4px 10px;border-radius:999px;font-weight:700}

/* ===== World map ===== */
.worlds{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.world{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:18px;box-shadow:var(--sh2);cursor:pointer;transition:transform .15s,box-shadow .2s;overflow:hidden}
.world:hover{transform:translateY(-4px);box-shadow:var(--sh)}
.world .tag{position:absolute;top:14px;left:14px;font-size:.72rem;font-weight:700;color:#fff;
  background:var(--wc);padding:3px 9px;border-radius:999px;opacity:.95}
.world .emoji{font-size:2.6rem;filter:drop-shadow(0 4px 6px rgba(0,0,0,.12))}
.world h3{font-family:var(--f-d);font-size:1.18rem;margin:.4em 0 .1em}
.world .sub{color:var(--muted);font-size:.9rem;min-height:2.6em}
.world .wbar{height:9px;border-radius:999px;background:#eef1fb;margin-top:12px;overflow:hidden}
.world .wbar>i{display:block;height:100%;background:var(--wc);width:0;transition:width .5s}
.world .wmeta{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-top:7px}
.world .crown{position:absolute;top:12px;right:12px;font-size:1.3rem;opacity:0;transition:.3s}
.world.done .crown{opacity:1}

/* ===== Buttons ===== */
.btn{display:inline-flex;align-items:center;gap:8px;justify-content:center;border-radius:14px;
  padding:12px 20px;font-weight:800;font-family:var(--f-d);font-size:1rem;transition:transform .12s,filter .2s}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,var(--w-accent),#00b4d8);color:#fff;box-shadow:var(--sh2)}
.btn-p:hover{filter:brightness(1.05)}
.btn-o{background:#fff;border:2px solid var(--w-accent);color:var(--w-accent)}
.btn-g{background:#eef1fb;color:var(--ink2)}
.btn-lg{padding:14px 26px;font-size:1.08rem}
.btn-block{display:flex;width:100%}

/* ===== World view ===== */
.crumbs{display:flex;align-items:center;gap:8px;font-size:.9rem;color:var(--muted);margin:18px 4px 6px;flex-wrap:wrap}
.crumbs a{color:var(--w-accent);font-weight:700;cursor:pointer}
.wbanner{border-radius:24px;padding:24px;color:#fff;background:linear-gradient(135deg,var(--wc),var(--wc2));box-shadow:var(--sh);position:relative;overflow:hidden}
.wbanner .be{position:absolute;font-size:8rem;opacity:.16;left:-10px;bottom:-30px}
.wbanner h2{font-family:var(--f-d);font-size:1.7rem;margin:.1em 0}
.learn{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-top:16px;box-shadow:var(--sh2)}
.learn h3{font-family:var(--f-d);margin:.2em 0 .6em;font-size:1.15rem;color:var(--wc)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--w-soft);color:var(--wc);padding:6px 12px;border-radius:999px;font-size:.86rem;font-weight:600}
.goalbox{background:#fff7 e6}
.lessons{display:grid;gap:10px;margin-top:16px}
.lrow{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
  border-radius:16px;padding:14px;cursor:pointer;transition:.15s;box-shadow:var(--sh2)}
.lrow:hover{border-color:var(--wc);transform:translateX(-3px)}
.lrow .num{width:40px;height:40px;flex:none;border-radius:12px;display:grid;place-items:center;
  font-family:var(--f-d);font-weight:800;background:var(--w-soft);color:var(--wc)}
.lrow.special .num{background:#fff3d6;color:#b8860b}
.lrow .lt{flex:1}
.lrow .lt b{font-size:1.02rem}
.lrow .lt span{display:block;color:var(--muted);font-size:.84rem}
.lrow .chk{font-size:1.3rem;color:#d4d9ee}
.lrow.done .chk{color:var(--ok)}
.quizrow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
@media(max-width:560px){.quizrow{grid-template-columns:1fr}}
.qcard{background:var(--card);border:2px solid var(--line);border-radius:18px;padding:16px;text-align:center;cursor:pointer;transition:.15s}
.qcard:hover{border-color:var(--wc)}
.qcard .qi{font-size:1.8rem}
.qcard b{display:block;font-family:var(--f-d);margin-top:4px}
.qcard .qn{color:var(--muted);font-size:.85rem}
.qcard .best{margin-top:6px;font-size:.8rem;font-weight:700;color:var(--ok)}

/* ===== Lesson view ===== */
.lesson{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--sh);overflow:hidden;margin-top:14px}
.lhead{padding:22px;color:#fff;background:linear-gradient(135deg,var(--wc),var(--wc2))}
.lhead .sk{display:inline-block;background:rgba(255,255,255,.22);padding:4px 10px;border-radius:999px;font-size:.8rem;font-weight:700;margin-bottom:6px}
.lhead h2{font-family:var(--f-d);margin:0;font-size:1.55rem}
.tabs{display:flex;gap:6px;padding:12px 14px;overflow-x:auto;border-bottom:1px solid var(--line);background:#fafbff}
.tab{flex:none;padding:9px 14px;border-radius:12px;font-weight:700;font-size:.9rem;color:var(--ink2);background:#eef1fb;white-space:nowrap}
.tab.active{background:var(--wc);color:#fff}
.lbody{padding:22px}
.block{display:none}
.block.active{display:block;animation:fade .3s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.block h3{font-family:var(--f-d);color:var(--wc);font-size:1.2rem;margin:.1em 0 .5em;display:flex;align-items:center;gap:8px}
.block p{margin:.5em 0}
.note{background:var(--w-soft);border-right:4px solid var(--wc);border-radius:12px;padding:12px 14px;margin:12px 0}
.ex{background:#f5fff9;border:1px solid #cdeedd;border-radius:14px;padding:16px;margin:12px 0}
.ex .q{font-weight:800;margin-bottom:8px}
.ex .step{display:flex;gap:10px;margin:7px 0}
.ex .step .s{flex:none;width:26px;height:26px;border-radius:8px;background:var(--ok);color:#fff;display:grid;place-items:center;font-weight:800;font-size:.85rem}
.ex .ans{margin-top:10px;font-weight:800;color:var(--ok)}
.mistake{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
@media(max-width:560px){.mistake{grid-template-columns:1fr}}
.mistake .x,.mistake .v{border-radius:14px;padding:14px}
.mistake .x{background:var(--badbg);border:1px solid #f5c2c4}
.mistake .v{background:var(--okbg);border:1px solid #bfe9d4}
.mistake h4{margin:.1em 0 .4em;font-size:.95rem}
.summary{background:linear-gradient(135deg,var(--w-soft),#fff);border:1px dashed var(--wc);border-radius:16px;padding:16px}
.summary li{margin:6px 0}
.nav-l{display:flex;justify-content:space-between;gap:10px;margin-top:18px}

/* practice (جرّب) */
.pq{background:#fafbff;border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 0}
.pq .qt{font-weight:700;margin-bottom:10px}
.opts{display:grid;gap:8px}
.opt{text-align:right;border:2px solid var(--line);background:#fff;border-radius:12px;padding:11px 14px;font-weight:600;font-size:.98rem;transition:.12s;display:flex;align-items:center;gap:10px}
.opt .k{width:26px;height:26px;flex:none;border-radius:8px;background:#eef1fb;color:var(--ink2);display:grid;place-items:center;font-weight:800}
.opt:hover{border-color:var(--wc)}
.opt.correct{border-color:var(--ok);background:var(--okbg)}
.opt.correct .k{background:var(--ok);color:#fff}
.opt.wrong{border-color:var(--bad);background:var(--badbg)}
.opt.wrong .k{background:var(--bad);color:#fff}
.opt.lock{pointer-events:none;opacity:.97}
.fb{margin-top:10px;padding:10px 12px;border-radius:12px;font-weight:700;display:none}
.fb.show{display:block;animation:fade .2s}
.fb.ok{background:var(--okbg);color:#0f7a4f}
.fb.no{background:var(--badbg);color:#b3373b}

/* ===== Interactive tools ===== */
.tool{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 0}
.tool .ctl{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px}
.tool input[type=number]{width:90px;padding:9px;border:2px solid var(--line);border-radius:10px;font-family:inherit;font-size:1rem;text-align:center}
.tool label{font-weight:700;color:var(--ink2)}
.svgbox{display:grid;place-items:center;padding:6px}
.divsim{font-family:'Courier New',monospace;font-size:1.25rem;direction:ltr;text-align:center;line-height:1.9}
.divsim .row{display:flex;justify-content:center;gap:2px}
.shapegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.shapecard{border:2px solid var(--line);border-radius:14px;padding:12px;text-align:center;cursor:pointer;transition:.15s;background:#fff}
.shapecard:hover{border-color:var(--wc)}
.shapecard.on{border-color:var(--wc);background:var(--w-soft)}
.shapecard .props{font-size:.82rem;color:var(--ink2);text-align:right;margin-top:8px;display:none}
.shapecard.on .props{display:block}
.grid10{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;width:230px;margin:auto}
.grid10 div{aspect-ratio:1;background:#f0f3fc;border-radius:3px;cursor:pointer;transition:.08s}
.grid10 div.on{background:var(--wc)}
.cnt{text-align:center;font-weight:800;font-family:var(--f-d);margin-top:10px;font-size:1.1rem}

/* ===== Quiz ===== */
.quiz{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--sh);padding:22px;margin-top:14px}
.qbar{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.qbar .qprog{flex:1;height:10px;border-radius:999px;background:#eef1fb;overflow:hidden}
.qbar .qprog>i{display:block;height:100%;background:var(--wc);transition:width .3s}
.qbar .qn{font-weight:800;color:var(--ink2);font-family:var(--f-d)}
.qimg{display:grid;place-items:center;margin:10px 0}
.qtext{font-size:1.18rem;font-weight:800;margin:8px 0 16px;line-height:1.6}
.qfoot{display:flex;justify-content:space-between;margin-top:16px;gap:10px}

/* ===== Result ===== */
.result{text-align:center}
.donut{width:170px;height:170px;margin:6px auto 0}
.result h2{font-family:var(--f-d);font-size:1.6rem;margin:.3em 0}
.result .msg{font-size:1.1rem;color:var(--ink2)}
.weak{background:#fff7e6;border:1px solid #ffe2a8;border-radius:16px;padding:14px;margin:16px 0;text-align:right}
.weak h4{margin:.1em 0 .5em;color:#b8860b}
.weak a{display:inline-block;background:#fff;border:1px solid #ffe2a8;border-radius:10px;padding:6px 12px;margin:4px;font-weight:700;color:#a86a00;cursor:pointer}

/* ===== Badges ===== */
.badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.badge{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;text-align:center;box-shadow:var(--sh2);opacity:.45;filter:grayscale(.8);transition:.3s}
.badge.earned{opacity:1;filter:none}
.badge .bi{font-size:2.4rem}
.badge b{display:block;font-family:var(--f-d);margin-top:6px}
.badge span{font-size:.8rem;color:var(--muted)}

/* toast / confetti */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);
  background:var(--ink);color:#fff;padding:13px 22px;border-radius:14px;font-weight:800;font-family:var(--f-d);
  box-shadow:var(--sh);z-index:200;transition:transform .4s;display:flex;gap:10px;align-items:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.conf{position:fixed;top:-10px;width:10px;height:14px;z-index:150;pointer-events:none;border-radius:2px}
@media(max-width:560px){.dash{grid-template-columns:1fr 1fr}.hero h1{font-size:1.6rem}}
.foot{text-align:center;color:var(--muted);font-size:.82rem;margin-top:30px}

/* ===== ENGINE + TOOLS CSS (v1) ===== */
.wrap{max-width:1080px;margin:0 auto;padding:18px 16px 60px}
.back{background:#fff;border:1.5px solid var(--line);color:var(--ink2);font-family:var(--f-b);font-weight:700;font-size:15px;padding:9px 16px;border-radius:14px;cursor:pointer;margin-bottom:14px}
.back:hover{background:var(--bg)}
.sec-title{font-family:var(--f-d);font-size:20px;color:var(--ink);margin:26px 0 12px}

/* hero */
.hero{background:linear-gradient(135deg,#6c5ce7,#4dabf7);border-radius:26px;padding:34px 24px;text-align:center;color:#fff;box-shadow:var(--sh);position:relative;overflow:hidden}
.hero-badge{display:inline-block;background:rgba(255,255,255,.22);padding:6px 16px;border-radius:30px;font-weight:700;font-size:14px;margin-bottom:10px}
.hero h1{font-family:var(--f-d);font-size:34px;margin:6px 0}
.hero p{font-size:16px;opacity:.95;margin:0}

/* dashboard */
.dash{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}
.stat{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:16px 10px;text-align:center;box-shadow:var(--sh2)}
.stat-n{font-family:var(--f-d);font-size:26px;color:var(--ink)}
.stat-l{font-size:13px;color:var(--muted);margin-top:2px}

/* journey */
.journey{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:16px;margin-top:14px;box-shadow:var(--sh2)}
.journey-top{display:flex;justify-content:space-between;font-family:var(--f-d);color:var(--ink);margin-bottom:8px}
.jbar{height:14px;background:var(--bg);border-radius:10px;overflow:hidden}
.jbar span{display:block;height:100%;background:linear-gradient(90deg,#6c5ce7,#4dabf7);border-radius:10px;transition:width .5s}

/* world grid */
.wgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.wcard{display:flex;align-items:center;gap:14px;text-align:right;background:var(--card);border:1.5px solid var(--line);border-radius:20px;padding:16px;cursor:pointer;box-shadow:var(--sh2);transition:transform .15s,box-shadow .15s;border-right:6px solid var(--wc)}
.wcard:hover{transform:translateY(-3px);box-shadow:var(--sh)}
.wcard-emoji{font-size:38px;width:62px;height:62px;display:grid;place-items:center;background:var(--soft);border-radius:16px;flex:none}
.wcard-body{flex:1;min-width:0}
.wcard-ch{font-size:13px;color:var(--muted)}
.wcard-name{font-family:var(--f-d);font-size:17px;color:var(--ink);margin:2px 0 8px}
.wbar{height:9px;background:var(--bg);border-radius:8px;overflow:hidden;margin-bottom:6px}
.wbar span{display:block;height:100%;background:var(--wc);border-radius:8px}
.wcard-meta{font-size:13px;color:var(--ink2)}
.wcard-meta .done{color:var(--ok)}
.wcard-go{font-size:26px;color:var(--muted);flex:none}
.btn-badges{width:100%;margin-top:22px;background:linear-gradient(135deg,#f5a623,#f59e0b);color:#fff;border:0;border-radius:16px;padding:15px;font-family:var(--f-d);font-size:17px;cursor:pointer;box-shadow:var(--sh2)}

/* world banner + learn */
.wbanner{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,var(--wc),var(--wc2));color:#fff;border-radius:22px;padding:22px;box-shadow:var(--sh)}
.wbanner-emoji{font-size:46px}
.wbanner-ch{opacity:.9;font-size:14px}
.wbanner h1{font-family:var(--f-d);font-size:26px;margin:2px 0 0}
.learn-card{background:var(--card);border:1.5px solid var(--line);border-radius:20px;padding:20px;margin-top:16px;box-shadow:var(--sh2)}
.learn-card h2{font-family:var(--f-d);color:var(--ink);margin:0 0 12px;font-size:20px}
.learn-card h3{font-size:15px;color:var(--wc);margin:0 0 8px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.chip{background:var(--soft);color:var(--ink);padding:7px 13px;border-radius:30px;font-size:13.5px;font-weight:600}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.two-col ul{margin:0;padding-right:18px}
.two-col li{margin-bottom:6px;color:var(--ink2);font-size:14px}

/* lessons list */
.lessons{display:flex;flex-direction:column;gap:10px}
.lrow{display:flex;align-items:center;gap:14px;background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:14px 16px;cursor:pointer;text-align:right;box-shadow:var(--sh2);transition:transform .12s}
.lrow:hover{transform:translateX(-4px)}
.lrow-n{width:34px;height:34px;border-radius:50%;background:var(--bg);color:var(--ink2);display:grid;place-items:center;font-family:var(--f-d);flex:none}
.lrow-done .lrow-n{background:var(--okbg);color:var(--ok)}
.lrow-t{flex:1;font-weight:600;color:var(--ink)}
.lrow-go{font-size:22px;color:var(--muted)}

/* quiz cards */
.quizgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.qcard{display:flex;flex-direction:column;gap:4px;border:0;border-radius:18px;padding:18px;cursor:pointer;color:#fff;font-family:var(--f-b);box-shadow:var(--sh2)}
.qcard b{font-family:var(--f-d);font-size:17px}
.qcard span{font-size:13px;opacity:.92}
.q-easy{background:linear-gradient(135deg,#16a06a,#37b24d)}
.q-mid{background:linear-gradient(135deg,#1971c2,#4dabf7)}
.q-final{background:linear-gradient(135deg,#e8590c,#f08c00)}

/* lesson head + tabs */
.lhead{background:var(--card);border:1.5px solid var(--line);border-right:6px solid var(--wc);border-radius:18px;padding:18px;box-shadow:var(--sh2)}
.lhead-n{font-size:13px;color:var(--muted)}
.lhead h1{font-family:var(--f-d);font-size:24px;color:var(--ink);margin:3px 0}
.lhead-skill{font-size:13.5px;color:var(--wc);font-weight:700}
.tabs{display:flex;flex-wrap:wrap;gap:7px;margin:16px 0}
.tab{background:var(--card);border:1.5px solid var(--line);color:var(--ink2);padding:8px 14px;border-radius:30px;cursor:pointer;font-family:var(--f-b);font-weight:700;font-size:13.5px}
.tab-on{background:var(--wc);color:#fff;border-color:var(--wc)}
.tabbody{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:20px;min-height:160px;box-shadow:var(--sh2)}

/* lesson sections */
.explain p{font-size:16px;line-height:1.9;color:var(--ink);margin:0 0 12px}
.example .ex-q{font-weight:700;color:var(--ink);background:var(--soft);padding:12px 14px;border-radius:12px;margin-bottom:12px}
.ex-steps{margin:0;padding-right:20px}
.ex-steps li{margin-bottom:9px;color:var(--ink2);line-height:1.7}
.ex-ans{margin-top:14px;background:var(--okbg);color:var(--ok);font-weight:700;padding:12px 14px;border-radius:12px}
.ch-intro{font-weight:700;color:var(--ink2);margin:0 0 14px}
.pq{background:var(--bg);border-radius:14px;padding:14px;margin-bottom:12px}
.pq-q{font-weight:700;color:var(--ink);margin-bottom:10px}
.pq-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:11px;cursor:pointer;font-family:var(--f-b);font-weight:600;font-size:15px;color:var(--ink)}
.opt:hover:not(:disabled){border-color:var(--wc)}
.opt-ok{background:var(--okbg)!important;border-color:var(--ok)!important;color:var(--ok)!important}
.opt-bad{background:var(--badbg)!important;border-color:var(--bad)!important;color:var(--bad)!important}
.pq-fb{margin-top:10px;font-weight:700;font-size:14px}
.pq-fb .ok{color:var(--ok)}.pq-fb .bad{color:var(--bad)}
.mistakes{display:flex;flex-direction:column;gap:12px}
.mrow{border:1.5px solid var(--line);border-radius:14px;overflow:hidden}
.mx{background:var(--badbg);color:var(--bad);padding:11px 14px;font-weight:600}
.mv{background:var(--okbg);color:var(--ok);padding:11px 14px;font-weight:600}
.sum-card{background:var(--soft);border-radius:14px;padding:16px}
.sum-card h3{margin:0 0 10px;color:var(--ink);font-size:17px}
.sum-card ul{margin:0;padding-right:20px}
.sum-card li{margin-bottom:7px;color:var(--ink2);font-weight:600}
.btn-complete{width:100%;margin-top:18px;background:linear-gradient(135deg,var(--wc,#6c5ce7),#4dabf7);color:#fff;border:0;border-radius:16px;padding:16px;font-family:var(--f-d);font-size:17px;cursor:pointer;box-shadow:var(--sh2)}
.btn-complete.done{background:var(--okbg);color:var(--ok)}

/* quiz running */
.quiz-head{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--sh2)}
.quiz-title{font-family:var(--f-d);font-size:19px;color:var(--ink)}
.quiz-count{font-size:14px;color:var(--muted);margin:4px 0 10px}
.qbar{height:12px;background:var(--bg);border-radius:8px;overflow:hidden}
.qbar span{display:block;height:100%;background:var(--wc);border-radius:8px;transition:width .3s}
.quiz-q{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:22px;margin-top:14px;box-shadow:var(--sh2)}
.qq{font-family:var(--f-d);font-size:20px;color:var(--ink);margin-bottom:18px;line-height:1.6}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qopt{background:#fff;border:2px solid var(--line);border-radius:14px;padding:15px;cursor:pointer;font-family:var(--f-b);font-weight:700;font-size:17px;color:var(--ink)}
.qopt:hover:not(:disabled){border-color:var(--wc);background:var(--bg)}
.qopt-ok{background:var(--okbg)!important;border-color:var(--ok)!important;color:var(--ok)!important}
.qopt-bad{background:var(--badbg)!important;border-color:var(--bad)!important;color:var(--bad)!important}

/* result */
.result{background:var(--card);border:1.5px solid var(--line);border-radius:22px;padding:26px;text-align:center;box-shadow:var(--sh)}
.result h1{font-family:var(--f-d);font-size:24px;color:var(--ink);margin:0 0 16px}
.donut{position:relative;width:160px;height:160px;margin:0 auto}
.donut svg{transform:rotate(-90deg);width:160px;height:160px}
.d-bg{fill:none;stroke:var(--bg);stroke-width:12}
.d-fg{fill:none;stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset .8s}
.donut-c{position:absolute;inset:0;display:grid;place-content:center}
.donut-pct{font-family:var(--f-d);font-size:34px;color:var(--ink)}
.donut-sub{font-size:14px;color:var(--muted)}
.grade{font-family:var(--f-d);font-size:20px;color:var(--ink);margin:14px 0}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.result-stats div{background:var(--bg);border-radius:14px;padding:12px}
.result-stats b{display:block;font-family:var(--f-d);font-size:22px;color:var(--ink)}
.result-stats span{font-size:13px;color:var(--muted)}
.weak{text-align:right;margin-top:16px}
.weak h3{font-size:16px;color:var(--ink);margin:0 0 10px}
.weak-row{width:100%;display:flex;justify-content:space-between;align-items:center;background:var(--badbg);border:1.5px solid #f5c2c7;border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;font-family:var(--f-b);color:var(--ink)}
.weak-row b{color:var(--bad);font-size:13px}
.allgood{background:var(--okbg);color:var(--ok);font-weight:700;padding:14px;border-radius:14px;margin-top:14px}
.result-btns{display:flex;gap:10px;margin-top:18px}
.rb-retry,.rb-home{flex:1;border:0;border-radius:14px;padding:14px;font-family:var(--f-d);font-size:16px;cursor:pointer}
.rb-retry{background:var(--wc);color:#fff}
.rb-home{background:var(--bg);color:var(--ink2)}

/* badges */
.badges-head{text-align:center;margin-bottom:18px}
.badges-head h1{font-family:var(--f-d);font-size:26px;color:var(--ink);margin:0}
.badges-head p{color:var(--muted);margin:6px 0 0}
.badges-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.badge{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:16px 10px;text-align:center;box-shadow:var(--sh2)}
.badge-ic{font-size:36px}
.badge-t{font-family:var(--f-d);font-size:14px;color:var(--ink);margin:6px 0 2px}
.badge-s{font-size:11.5px;color:var(--muted)}
.badge-off{opacity:.55;filter:grayscale(.6)}
.badge-on{border-color:var(--gold);background:linear-gradient(180deg,#fffbeb,#fff)}

/* tools */
.tool-card{background:var(--soft,#f3f0ff);border-radius:16px;padding:18px}
.tool-card h4{margin:0 0 14px;color:var(--ink);font-size:16px}
.tool-note{font-size:13.5px;color:var(--ink2);background:#fff;border-radius:10px;padding:10px 12px;margin:10px 0 0;line-height:1.6}
.tool-btn,.tool-row{margin-top:12px}
.tool-btn{background:var(--wc,#6c5ce7);color:#fff;border:0;border-radius:12px;padding:10px 18px;font-family:var(--f-b);font-weight:700;cursor:pointer}
.divsim{background:#fff;border-radius:12px;padding:16px}
.div-grid{font-family:'Courier New',monospace;font-size:26px;text-align:center;color:var(--ink);direction:ltr}
.div-quot{font-weight:700;color:var(--wc,#6c5ce7);min-height:30px}
.div-line{font-weight:700;border-top:2px solid var(--ink);display:inline-block;padding-top:4px}
.div-steps{margin:14px 0 0;padding-right:20px}
.div-steps li{margin-bottom:7px;color:var(--ink2);line-height:1.6}
.shape3d-grid,.poly-grid,.lines-grid,.ang-grid,.tri-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.shape3d{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:12px;cursor:pointer;text-align:center}
.s3-svg{width:64px;height:64px;margin:0 auto}
.s3-name{font-family:var(--f-d);color:var(--ink);margin-top:6px}
.s3-props{font-size:12.5px;color:var(--ink2);max-height:0;overflow:hidden;transition:max-height .25s,margin .25s;margin:0}
.shape3d.open .s3-props{max-height:60px;margin-top:8px}
.poly,.lined,.angd,.trid{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:12px;text-align:center;font-size:13px;color:var(--ink2)}
.poly-svg,.lined svg,.angd svg,.trid svg{width:60px;height:60px}
.poly b,.lined b,.angd b,.trid b{color:var(--ink);font-family:var(--f-d);display:block;margin-top:4px}
.lined span,.angd span,.trid span{font-size:12px;color:var(--muted);display:block}
.nl-svg,.coord-svg,.meas-svg{width:100%;background:#fff;border-radius:12px;padding:8px;max-width:340px;display:block;margin:0 auto}
.coord-svg{max-width:260px}
.clock-row{display:flex;align-items:center;justify-content:center;gap:16px}
.clockf{text-align:center}
.clockf svg{width:80px;height:80px}
.clockf b{display:block;font-family:var(--f-d);color:var(--ink);margin-top:4px}
.clock-arrow{font-size:28px;color:var(--wc,#6c5ce7)}
.fb-wrap{display:flex;gap:6px;background:#fff;padding:12px;border-radius:12px}
.fb-cell{flex:1;height:54px;border:2px solid #c9b8ff;border-radius:8px;background:#fff;cursor:pointer}
.fb-cell.on{background:var(--wc,#6c5ce7)}
.fb-read{text-align:center;font-family:var(--f-d);font-size:20px;color:var(--ink);margin-top:10px}
.g10{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;background:#fff;padding:12px;border-radius:12px}
.g10c{aspect-ratio:1;border:1.5px solid #74c0fc;border-radius:5px;background:#fff;cursor:pointer}
.g10c.on{background:#1971c2}
.g100{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;background:#fff;padding:10px;border-radius:12px;max-width:280px;margin:0 auto}
.g100c{aspect-ratio:1;border:.5px solid #c5e0fb;background:#fff;cursor:pointer;border-radius:2px}
.g100c.on{background:#1971c2}
.round-ex,.align-demo,.div-grid{background:#fff;border-radius:12px;padding:16px}
.re-row{padding:10px 0;border-bottom:1px solid var(--line);color:var(--ink2);line-height:1.7}
.re-row:last-child{border-bottom:0}
.re-ans{background:var(--okbg);color:var(--ok);font-weight:700;padding:2px 10px;border-radius:8px}
.align-demo{text-align:center;direction:ltr;font-family:'Courier New',monospace;font-size:24px;color:var(--ink);width:fit-content;margin:0 auto}
.ad-num{letter-spacing:3px;padding:3px 0}
.ad-line{border-top:2px solid var(--ink);margin:4px 0}
.ad-res{color:var(--e8590c,#e8590c);font-weight:700;color:#e8590c}
.visual{display:block}

/* toast + confetti */
#toast,.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:13px 22px;border-radius:30px;font-family:var(--f-d);font-size:15px;box-shadow:var(--sh);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:200;max-width:90%;text-align:center}
#toast.show,.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden}
.confetti i{position:absolute;top:-12px;width:10px;height:14px;border-radius:2px;animation:fall 2.2s linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.2}}

/* responsive */
@media(max-width:680px){
  .dash{grid-template-columns:repeat(2,1fr)}
  .wgrid{grid-template-columns:1fr}
  .two-col{grid-template-columns:1fr}
  .quizgrid{grid-template-columns:1fr}
  .badges-grid{grid-template-columns:repeat(2,1fr)}
  .pq-opts,.qopts{grid-template-columns:1fr}
  .hero h1{font-size:28px}
  .result-stats{grid-template-columns:repeat(3,1fr)}
}


/* ===== ILLUSTRATIONS + GAMES CSS ===== */
.hero{display:flex;align-items:center;gap:18px;text-align:right}
.hero-art{flex:none;width:300px;max-width:46%}
.hero-svg{width:100%;height:auto;display:block;border-radius:16px}
.hero-txt{flex:1}
.hero-coins{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.hero-coins span{background:rgba(255,255,255,.22);padding:6px 12px;border-radius:20px;font-weight:700;font-size:14px}
.mascot-svg{width:92px;height:92px;display:block;animation:bob 2.6s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

/* games CTA on home */
.games-cta{display:flex;align-items:center;gap:14px;width:100%;margin-top:16px;text-align:right;background:linear-gradient(120deg,#ff6b9d,#a259ff,#5b8def);background-size:200% 200%;animation:flow 5s ease infinite;border:0;border-radius:20px;padding:18px;cursor:pointer;color:#fff;box-shadow:var(--sh)}
@keyframes flow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.gc-emoji{font-size:40px;flex:none;animation:bob 2.2s ease-in-out infinite}
.gc-txt{flex:1}.gc-txt b{font-family:var(--f-d);font-size:19px;display:block}.gc-txt span{font-size:13.5px;opacity:.95}
.gc-go{font-size:30px;flex:none}

/* world banner scene */
.wbanner{position:relative;overflow:hidden}
.wbanner-scene{position:absolute;inset:0;opacity:.9;z-index:0}
.wbanner-scene svg{width:100%;height:100%;object-fit:cover}
.wbanner-emoji,.wbanner>div:last-child{position:relative;z-index:1}
.wbanner-emoji{filter:drop-shadow(0 2px 4px rgba(0,0,0,.25))}
.wbanner h1,.wbanner-ch{text-shadow:0 2px 8px rgba(0,0,0,.3)}

/* world game button */
.world-game{display:flex;align-items:center;gap:14px;width:100%;text-align:right;background:linear-gradient(120deg,var(--gc),var(--gc2));border:0;border-radius:18px;padding:16px;cursor:pointer;color:#fff;box-shadow:var(--sh2)}
.wg-emoji{font-size:34px;flex:none}
.wg-txt{flex:1}.wg-txt b{font-family:var(--f-d);font-size:17px;display:block}.wg-txt small{font-size:13px;opacity:.95}
.wg-go{font-size:22px;flex:none;background:rgba(255,255,255,.25);width:40px;height:40px;border-radius:50%;display:grid;place-items:center}

/* games hub */
.games-head{display:flex;align-items:center;gap:14px;background:linear-gradient(120deg,#5b8def,#a259ff);color:#fff;border-radius:22px;padding:18px;box-shadow:var(--sh);margin-bottom:18px}
.gh-mascot{flex:none;width:72px}.gh-mascot svg{width:72px;height:72px}
.games-head h1{font-family:var(--f-d);font-size:23px;margin:0}
.games-head p{margin:4px 0 0;font-size:14px;opacity:.95}
.sound-btn{margin-inline-start:auto;background:rgba(255,255,255,.25);border:0;width:46px;height:46px;border-radius:50%;font-size:22px;cursor:pointer;flex:none}
.gcards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.gcard{position:relative;text-align:center;border:0;border-radius:20px;padding:20px 14px;cursor:pointer;color:#fff;background:linear-gradient(150deg,var(--gc),var(--gc2));box-shadow:var(--sh2);transition:transform .15s,box-shadow .15s;overflow:hidden}
.gcard:hover{transform:translateY(-4px) scale(1.02);box-shadow:var(--sh)}
.gcard-emoji{font-size:46px;animation:bob 2.6s ease-in-out infinite}
.gcard-name{font-family:var(--f-d);font-size:18px;margin:8px 0 4px}
.gcard-desc{font-size:12.5px;opacity:.95;line-height:1.5;min-height:36px}
.gcard-hi{font-size:12px;background:rgba(255,255,255,.22);border-radius:20px;padding:4px 10px;display:inline-block;margin-top:8px}
.gcard-play{margin-top:10px;font-family:var(--f-d);background:#fff;color:var(--gc);border-radius:20px;padding:7px;font-size:14px}

/* arcade */
.arcade{background:linear-gradient(180deg,var(--gc),var(--gc2));border-radius:22px;padding:18px;color:#fff;box-shadow:var(--sh)}
.arc-top{display:flex;justify-content:space-between;align-items:center;font-family:var(--f-d)}
.arc-lives{font-size:20px;letter-spacing:2px}
.arc-score b{font-size:20px}
.arc-combo{text-align:center;height:24px;font-family:var(--f-d);font-size:16px;color:#fff3bf}
.arc-stage{position:relative;height:120px;margin:6px 0 14px;background:rgba(255,255,255,.12);border-radius:16px;overflow:hidden}
.arc-fuelwrap{position:absolute;left:14px;top:10px;bottom:10px;width:12px;background:rgba(0,0,0,.18);border-radius:8px;overflow:hidden;transform:rotate(180deg)}
.arc-fuel{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(#ffd43b,#ff922b);transition:width .4s;height:100%}
.arc-rocket{position:absolute;left:50%;transform:translateX(-50%);font-size:42px;transition:bottom .5s cubic-bezier(.3,1.4,.5,1);filter:drop-shadow(0 4px 6px rgba(0,0,0,.3))}
.arc-q{background:#fff;color:var(--ink);font-family:var(--f-d);font-size:28px;text-align:center;padding:18px;border-radius:16px;direction:ltr;margin-bottom:14px}
.arc-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.arc-opt{background:rgba(255,255,255,.95);color:var(--ink);border:2px solid transparent;border-radius:14px;padding:15px;font-family:var(--f-d);font-size:19px;cursor:pointer;direction:ltr;transition:transform .1s}
.arc-opt:hover:not(:disabled){transform:scale(1.04)}
.arc-ok{background:#d3f9d8!important;border-color:#2f9e44!important;color:#2b8a3e!important}
.arc-bad{background:#ffe3e3!important;border-color:#e03131!important;color:#c92a2a!important}

/* game over */
.gover{background:var(--card);border:1.5px solid var(--line);border-top:8px solid var(--gc);border-radius:22px;padding:30px 22px;text-align:center;box-shadow:var(--sh)}
.gover-mascot{width:110px;margin:0 auto 6px}.gover-mascot svg{width:110px;height:110px}
.gover h1{font-family:var(--f-d);font-size:26px;color:var(--ink);margin:0 0 10px}
.gover-score{font-family:var(--f-d);font-size:46px;color:var(--gc)}
.gover-hi{display:inline-block;background:var(--gold);color:#fff;font-family:var(--f-d);padding:7px 18px;border-radius:24px;margin-top:10px}
.gover-sub{color:var(--muted);margin-top:8px}
.gover-coins{margin-top:10px;font-weight:700;color:var(--ink2)}
.gover-btns{display:flex;gap:10px;margin-top:20px}
.gover-btns .rb-retry{background:var(--gc)}

/* pizza */
.pizza,.match,.clockg{background:var(--card);border:1.5px solid var(--line);border-radius:22px;padding:20px;box-shadow:var(--sh);text-align:center}
.pz-head{display:flex;justify-content:space-between;font-family:var(--f-d);color:var(--ink);margin-bottom:10px}
.pz-target{font-family:var(--f-d);font-size:22px;color:var(--ink);background:var(--soft,#ffe8f0);border-radius:14px;padding:12px;margin-bottom:12px}
.pz-target b{color:#c2255c;font-size:26px;direction:ltr;display:inline-block}
.pz-svg{width:100%;max-width:280px;height:auto;margin:0 auto;display:block}
.pz-read{font-family:var(--f-d);font-size:18px;color:var(--ink2);margin:12px 0}
.pz-read b{color:#c2255c;direction:ltr;display:inline-block}
.pz-check{background:linear-gradient(120deg,#c2255c,#f06595);color:#fff;border:0;border-radius:14px;padding:14px 30px;font-family:var(--f-d);font-size:18px;cursor:pointer;box-shadow:var(--sh2)}

/* match */
.match-hint{color:var(--muted);margin:0 0 14px;font-size:14px}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:420px;margin:0 auto}
.mcard{aspect-ratio:3/4;border:0;background:transparent;cursor:pointer;perspective:600px;padding:0}
.mcard-in{position:relative;width:100%;height:100%;transition:transform .4s;transform-style:preserve-3d}
.mcard.up .mcard-in{transform:rotateY(180deg)}
.mcard-back,.mcard-front{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;display:grid;place-items:center;border:2px solid var(--line)}
.mcard-back{background:linear-gradient(150deg,#51cf66,#2f9e44);color:#fff;font-size:28px}
.mcard-front{background:#fff;transform:rotateY(180deg)}
.mcard-front svg{width:70%;height:70%}
.mcard-name{font-family:var(--f-d);font-size:16px;color:var(--ink)}
.mcard.matched .mcard-front{background:#d3f9d8;border-color:#2f9e44}

/* clock game */
.clockg-faces{display:flex;align-items:center;justify-content:center;gap:14px;margin:10px 0 18px}
.cgf{text-align:center}.cgf svg{width:100px;height:100px}.cgf span{display:block;font-size:13px;color:var(--muted);margin-top:4px}
.cg-arrow{font-size:30px;color:#1971c2}
.clockg .arc-opt{background:var(--bg);color:var(--ink);border:2px solid var(--line);font-size:16px;direction:rtl}
.clockg .arc-opt:hover:not(:disabled){border-color:#1971c2}

@media(max-width:680px){
  .hero{flex-direction:column;text-align:center}
  .hero-art{width:100%;max-width:320px}
  .gcards{grid-template-columns:1fr 1fr}
  .mgrid{grid-template-columns:repeat(3,1fr)}
  .arc-q{font-size:24px}
  .gcard-desc{min-height:48px}
}

  let r={};

  return Object.assign({ lessonsDone:{}, quizScores:{}, stars:0, badges:[], coins:0, xp:0, gameHigh:{}, sound:true }, r);
}

/* ================= HELPERS ================= */
const $ = s => document.querySelector(s);
const app = () => $("#app");
function lid(w,n){ return w+"-L"+n; }
function totalLessons(){ return WORLDS.reduce((a,w)=>a+w.lessons.length,0); }
function doneCount(){ return Object.keys(S.lessonsDone).length; }
function worldDone(w){ return w.lessons.filter(l=>S.lessonsDone[lid(w.id,l.n)]).length; }
function masteredSkills(){
  const set=new Set();
  WORLDS.forEach(w=>w.lessons.forEach(l=>{ if(S.lessonsDone[lid(w.id,l.n)]) set.add(w.id+"|"+l.skill); }));
  return set.size;
}
function totalSkills(){
  const set=new Set();
  WORLDS.forEach(w=>w.lessons.forEach(l=>set.add(w.id+"|"+l.skill)));
  return set.size;
}
function avgMastery(){
  const v=Object.values(S.quizScores);
  if(!v.length) return 0;
  return Math.round(v.reduce((a,b)=>a+b,0)/v.length);
}
function esc(t){ return (""+t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  let t=$("#toast"); if(!t){ t=document.createElement("div"); t.id="toast"; document.body.appendChild(t); }

}
function confetti(){
  const c=["#6c5ce7","#1971c2","#16a06a","#f5a623","#e8590c","#e5484d","#ffce3d"];
  const box=document.createElement("div"); box.className="confetti";
  for(let i=0;i<60;i++){
    const p=document.createElement("i");
    p.style.left=Math.random()*100+"%";
    p.style.background=c[i%c.length];
    p.style.animationDelay=(Math.random()*0.4)+"s";
    p.style.transform="rotate("+(Math.random()*360)+"deg)";
    box.appendChild(p);
  }
  document.body.appendChild(box);
  setTimeout(()=>box.remove(),2600);
}

/* ================= QUIZ ================= */
let Q={};
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function startQuiz(wid,count){
  const w=WORLDS.find(x=>x.id===wid);
  let pool=shuffle(w.bank);
  if(pool.length<count){ // pad by repeating shuffled pool
    let ext=[]; while(ext.length<count) ext=ext.concat(shuffle(w.bank));
    pool=ext;
  }
  const items=pool.slice(0,count);
  Q={wid,count,items,i:0,correct:0,answers:[],wrongSkills:{}};
  go('quiz');
}
function renderQuiz(){
  const w=WORLDS.find(x=>x.id===Q.wid);
  const it=Q.items[Q.i];
  const pct=Math.round(Q.i/Q.count*100);
  app().innerHTML=`
  <button class="back" onclick="if(confirm('إنهاء الاختبار والخروج؟'))go('world',{wid:'${Q.wid}'})">‹ خروج</button>
  <section class="quiz-head" style="--wc:${w.wc}">
    <div class="quiz-title">${w.emoji} اختبار ${w.name}</div>
    <div class="quiz-count">سؤال ${Q.i+1} من ${Q.count}</div>
    <div class="qbar"><span style="width:${pct}%"></span></div>
  </section>
  <section class="quiz-q" style="--wc:${w.wc}">
    <div class="qq">${it.q}</div>
    <div class="qopts" id="qopts">
      ${it.opts.map((o,oi)=>`<button class="qopt" onclick="quizAnswer(${oi})">${o}</button>`).join("")}
    </div>
  </section>`;
}
function quizAnswer(oi){
  const it=Q.items[Q.i];
  const opts=document.querySelectorAll("#qopts .qopt");
  opts.forEach((o,i)=>{ o.disabled=true; if(i===it.c)o.classList.add("qopt-ok"); });
  const ok = oi===it.c;
  if(ok){ opts[oi].classList.add("qopt-ok"); Q.correct++; }
  else { opts[oi].classList.add("qopt-bad"); Q.wrongSkills[it.sk]=(Q.wrongSkills[it.sk]||0)+1; }
  setTimeout(()=>{
    Q.i++;
    if(Q.i>=Q.count) finishQuiz();
    else renderQuiz();
  }, 750);
}
function finishQuiz(){
  const pct=Math.round(Q.correct/Q.count*100);
  const key=Q.wid+"-"+Q.count;

  checkBadges();
  go('result');
}

function clockFace(t){
  const [h,m]=t.split(":").map(Number);
  const ma=(m/60)*2*Math.PI - Math.PI/2;
  const ha=((h%12)/12 + m/720)*2*Math.PI - Math.PI/2;
  const mx=30+22*Math.cos(ma), my=30+22*Math.sin(ma);
  const hx=30+14*Math.cos(ha), hy=30+14*Math.sin(ha);
  return `<div class="clockf"><svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="27" fill="#fff" stroke="#1d2440" stroke-width="2.5"/>
    <line x1="30" y1="30" x2="${hx.toFixed(1)}" y2="${hy.toFixed(1)}" stroke="#1d2440" stroke-width="3"/>
    <line x1="30" y1="30" x2="${mx.toFixed(1)}" y2="${my.toFixed(1)}" stroke="#e8590c" stroke-width="2"/>
    <circle cx="30" cy="30" r="3" fill="#1d2440"/></svg><b>${t}</b></div>`;
}

let AC=null;
function actx(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function beep(freq,dur,type,vol){
  if(!S.sound) return; const c=actx(); if(!c) return;
  try{
    const o=c.createOscillator(), g=c.createGain();
    o.type=type||"sine"; o.frequency.value=freq;
    g.gain.value=vol||0.08; o.connect(g); g.connect(c.destination);
    o.start(); g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime+(dur||0.15));
    o.stop(c.currentTime+(dur||0.15));
  }catch(e){}
}

/* ================= QUESTION GENERATORS ================= */
function shuf(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function mcq(correct, distractors){
  const set=new Set([String(correct)]); const opts=[String(correct)];
  for(const d of distractors){ const s=String(d); if(!set.has(s)){ set.add(s); opts.push(s);} if(opts.length>=4)break; }
  let g=0; while(opts.length<4){ const s=String(correct+(++g)); if(!set.has(s)){set.add(s);opts.push(s);} }
  const sh=shuf(opts);
  return {opts:sh, c:sh.indexOf(String(correct))};
}
function genDiv(){
  const d=ri(2,9), q=ri(3,40), dividend=d*q;
  const m=mcq(q,[q+1,q-1,q+2,d,dividend-d]);
  return {q:`${dividend} ÷ ${d} =`, opts:m.opts, c:m.c};
}
function genDec(){
  const sub=Math.random()<0.5;
  const a=(ri(15,260)/10), b=(ri(8,140)/10);
  let x=Math.max(a,b), y=Math.min(a,b);
  if(sub){
    const r=+(x-y).toFixed(1);
    const m=mcq(r,[+(x+y).toFixed(1), +(r+0.1).toFixed(1), +(r-0.1).toFixed(1), +(x-y+1).toFixed(1)]);
    return {q:`${x} − ${y} =`, opts:m.opts, c:m.c};
  } else {
    const r=+(a+b).toFixed(1);
    const m=mcq(r,[+(Math.abs(a-b)).toFixed(1), +(r+0.1).toFixed(1), +(r-1).toFixed(1), +(r/10).toFixed(2)]);
    return {q:`${a} + ${b} =`, opts:m.opts, c:m.c};
  }
}
function genMeas(){
  const t=ri(0,2);
  if(t===0){ const a=ri(3,12),b=ri(3,12); const m=mcq(2*(a+b),[a+b,a*b,2*a+b,2*(a+b)+2]); return {q:`محيط مستطيل طوله ${a} م وعرضه ${b} م =`,opts:m.opts.map(o=>o+" م"),c:m.c}; }
  if(t===1){ const a=ri(2,9); const m=mcq(a*a,[a*4,a+a,a*a+a,a*a-1]); return {q:`مساحة مربع طول ضلعه ${a} سم =`,opts:m.opts.map(o=>o+" سم²"),c:m.c}; }
  const h1=ri(1,9),m1=ri(0,5)*10, add=ri(1,3); const eh=h1+add;
  const m=mcq(add+" ساعة",[`${add} ساعة و30 دقيقة`,`${add+1} ساعة`,`${add-1} ساعة`,`30 دقيقة`]);
  return {q:`الزمن من ${h1}:${String(m1).padStart(2,'0')} إلى ${eh}:${String(m1).padStart(2,'0')} =`,opts:m.opts,c:m.c};
}
const GEN={div:genDiv, dec:genDec, meas:genMeas};

    return `<button class="mcard ${up?'up':''} ${matched?'matched':''}" onclick="matchFlip(${i})" ${up?'disabled':''}>
      <div class="mcard-in">
        <div class="mcard-back">❓</div>
        <div class="mcard-front">${c.type==="pic"?c.svg:`<span class="mcard-name">${c.txt}</span>`}</div>
      </div></button>`;
  }).join("");
  const allDone=M.done.length===SHAPES.length;
  app().innerHTML=`
  <button class="back" onclick="if(confirm('إنهاء اللعبة؟'))go('games')">‹ خروج</button>
  <section class="match" style="--gc:#2f9e44">
    <div class="pz-head"><span>الحركات: ${M.moves}</span><span>طابقت: ${M.done.length}/${SHAPES.length}</span></div>
    <p class="match-hint">اقلب بطاقتين: الشكل مع اسمه.</p>
    <div class="mgrid">${cards}</div>
    ${allDone?`<button class="pz-check" onclick="matchOver()">🎉 خلّصت! النتيجة</button>`:''}
  </section>`;
}
function matchFlip(i){
  if(M.flipped.includes(i)||M.done.includes(M.cards[i].k)||M.flipped.length>=2) return;
  M.flipped.push(i); sfxTick(); matchRender();
  if(M.flipped.length===2){
    M.moves++;
    const [a,b]=M.flipped;
    if(M.cards[a].k===M.cards[b].k){
      M.done.push(M.cards[a].k); M.flipped=[]; addCoins(3); sfxRight(); sfxCoin();
      setTimeout(matchRender,400);
    } else {
      sfxWrong();
      setTimeout(()=>{ M.flipped=[]; matchRender(); },850);
    }
  }
}
function matchOver(){
  const secs=Math.round((Date.now()-M.start)/1000);
  const score=Math.max(20, 200 - M.moves*5 - secs);
  const hi=S.gameHigh.match||0, isHi=score>hi; if(isHi){S.gameHigh.match=score;save();}
  sfxWin(); confetti(); checkBadges();
  app().innerHTML=`<section class="gover" style="--gc:#2f9e44"><div class="gover-mascot">${mascot("happy")}</div>
    <h1>🧩 ممتاز!</h1><div class="gover-score">${score} نقطة</div>
    <div class="gover-sub">${M.moves} حركة • ${secs} ثانية</div>
    ${isHi?'<div class="gover-hi">🏅 رقم قياسي جديد!</div>':''}
    <div class="gover-btns"><button class="rb-retry" onclick="go('game',{gid:'match'})">🔁 مرة ثانية</button>
    <button class="rb-home" onclick="go('games')">صالة الألعاب</button></div></section>`;
}

/* ================= CLOCK HERO ================= */
let CL={};
function clockStart(){ CL={round:1,score:0,lives:3,q:null}; clockNew(); }
function clockNew(){
  const sh=ri(1,9), sm=ri(0,11)*5, addH=ri(1,3), addM=[0,15,30,45][ri(0,3)];
  let eh=sh+addH, em=sm+addM; if(em>=60){em-=60;eh++;}
  const startT=`${sh}:${String(sm).padStart(2,'0')}`, endT=`${eh}:${String(em).padStart(2,'0')}`;
  let label = addH+" ساعة"+(addM?` و${addM} دقيقة`:"");
  const opts=shuf([label, `${addH+1} ساعة`, `${addH} ساعة و${addM||15} دقيقة`.replace("و0 دقيقة",""), `${addM||30} دقيقة`].filter((v,i,a)=>a.indexOf(v)===i).slice(0,4));
  while(opts.length<4) opts.push(`${ri(1,4)} ساعة و${[15,30,45][ri(0,2)]} دقيقة`);
  CL.q={startT,endT,label,opts:opts.slice(0,4),c:opts.indexOf(label)};
  if(CL.q.c<0){ CL.q.opts[0]=label; CL.q.c=0; CL.q.opts=shuf(CL.q.opts); CL.q.c=CL.q.opts.indexOf(label); }
  clockRender();
}
function clockRender(){
  const hearts="❤️".repeat(CL.lives)+"🤍".repeat(3-CL.lives);
  app().innerHTML=`
  <button class="back" onclick="if(confirm('إنهاء اللعبة؟'))go('games')">‹ خروج</button>
  <section class="clockg" style="--gc:#1971c2">
    <div class="pz-head"><span>${hearts}</span><span>النقاط: <b>${CL.score}</b></span></div>
    <p class="match-hint">كم الزمن المنقضي بين الساعتين؟</p>
    <div class="clockg-faces">
      <div class="cgf">${clockFace(CL.q.startT)}<span>البداية</span></div>
      <div class="cg-arrow">←</div>
      <div class="cgf">${clockFace(CL.q.endT)}<span>النهاية</span></div>
    </div>
    <div class="arc-opts">${CL.q.opts.map((o,i)=>`<button class="arc-opt" onclick="clockAns(${i})">${o}</button>`).join("")}</div>
  </section>`;
}
function clockAns(i){
  const opts=document.querySelectorAll(".arc-opt"); opts.forEach((o,k)=>{o.disabled=true;if(k===CL.q.c)o.classList.add("arc-ok");});
  if(i===CL.q.c){ CL.score+=15; addCoins(3); sfxRight(); sfxCoin(); CL.round++;
    if(CL.round>8){ setTimeout(clockOver,700); return; }
    setTimeout(clockNew,650);
  } else { opts[i].classList.add("arc-bad"); CL.lives--; sfxWrong();
    if(CL.lives<=0){ setTimeout(clockOver,800); } else { setTimeout(clockNew,900); }
  }
}
function clockOver(){
  const hi=S.gameHigh.clock||0, isHi=CL.score>hi; if(isHi){S.gameHigh.clock=CL.score;save();}
  if(CL.score>0)sfxWin(); checkBadges();
  app().innerHTML=`<section class="gover" style="--gc:#1971c2"><div class="gover-mascot">${mascot(CL.score>0?"happy":"sad")}</div>
    <h1>⏰ انتهى!</h1><div class="gover-score">${CL.score} نقطة</div>
    ${isHi?'<div class="gover-hi">🏅 رقم قياسي جديد!</div>':`<div class="gover-sub">أعلى نتيجة: ${S.gameHigh.clock}</div>`}
    <div class="gover-btns"><button class="rb-retry" onclick="go('game',{gid:'clock'})">🔁 مرة ثانية</button>
    <button class="rb-home" onclick="go('games')">صالة الألعاب</button></div></section>`;
}

/* ================= BOOT ================= */
render();</script>
